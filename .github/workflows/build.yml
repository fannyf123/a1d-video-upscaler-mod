name: 🔧 Build EXE (Windows)  —  v2.7.0+

# Trigger: manual dari GitHub UI atau saat push tag versi (e.g. v2.7.0)
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────────
      - name: 📥 Checkout Source
        uses: actions/checkout@v4

      # ── 2. Python 3.12 ───────────────────────────────────────────────────────────
      - name: 🐍 Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      # ── 3. Install Dependencies ────────────────────────────────────────────────
      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pyarmor
          playwright install chromium --with-deps

      # ── 4. Encrypt with PyArmor ────────────────────────────────────────────────
      - name: 🔒 Encrypt Source with PyArmor
        run: |
          pyarmor gen --output build_obf -r main.py App/
          Write-Host "PyArmor encryption complete."
          ls build_obf

      # ── 5. Copy Assets ──────────────────────────────────────────────────────────────
      - name: 📂 Copy Assets
        shell: powershell
        run: |
          Copy-Item config.default.json build_obf\
          New-Item -ItemType Directory -Force build_obf\App | Out-Null

      # ── 6. Build EXE with PyInstaller ────────────────────────────────────────────
      - name: 🔨 Build EXE with PyInstaller
        working-directory: build_obf
        shell: powershell
        run: |
          # Detect pyarmor runtime package name dynamically
          $runtime = Get-ChildItem -Filter "pyarmor_runtime*" -Directory | Select-Object -First 1 -ExpandProperty Name
          Write-Host "PyArmor runtime: $runtime"

          pyinstaller `
            --noconfirm `
            --onedir `
            --windowed `
            --name "A1D-Upscaler" `
            --add-data "config.default.json;." `
            --collect-all PySide6 `
            --collect-all qtawesome `
            --collect-all playwright `
            --collect-all bs4 `
            --collect-all lxml `
            --hidden-import App.background_process `
            --hidden-import App.batch_processor `
            --hidden-import App.ffmpeg_postprocessor `
            --hidden-import App.mailticking_pw `
            --hidden-import App.logger `
            --hidden-import App.progress_handler `
            --hidden-import App.temp_cleanup `
            --hidden-import App.tools_checker `
            --hidden-import $runtime `
            --exclude-module tkinter `
            --exclude-module matplotlib `
            --exclude-module scipy `
            --exclude-module notebook `
            main.py

      # ── 7. Package as ZIP ─────────────────────────────────────────────────────────────
      - name: 📦 Package Output as ZIP
        shell: powershell
        run: |
          $version = "${{ github.ref_name }}"
          if (-not $version) { $version = "dev-build" }
          $zipName = "A1D-Upscaler-${version}-Windows.zip"
          Write-Host "Creating $zipName ..."
          Compress-Archive -Path "build_obf\dist\A1D-Upscaler\*" -DestinationPath $zipName
          Write-Host "Done: $zipName"

      # ── 8. Upload Artifact ───────────────────────────────────────────────────────────
      - name: ⬆️ Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: A1D-Upscaler-Windows-EXE
          path: A1D-Upscaler-*.zip
          retention-days: 30

      # ── 9. GitHub Release (tag push only) ─────────────────────────────────────────
      - name: 🚀 Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: A1D-Upscaler-*.zip
          generate_release_notes: true
          name: "A1D Upscaler ${{ github.ref_name }}"
